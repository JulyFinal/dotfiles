[deepin]
image=docker.io/linuxdeepin/apricot:v20.8-compatible
home=~/deepin-home
additional_packages="locales com.qq.weixin.work.deepin"
init_hooks="sudo sed -i 's/^# *zh_CN.UTF-8 UTF-8/zh_CN.UTF-8 UTF-8/' /etc/locale.gen; sudo locale-gen;"
init=false
nvidia=false
pull=true
root=false
replace=false
start_now=false
