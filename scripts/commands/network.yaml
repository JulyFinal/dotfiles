- name: proxy on
  cmd: |
   proxy_on(){ ip="${1:-127.0.0.1}"; port="${2:-10808}"; export http_proxy="http://$ip:$port" https_proxy="http://$ip:$port" all_proxy="http://$ip:$port" HTTP_PROXY="http://$ip:$port" HTTPS_PROXY="http://$ip:$port" ALL_PROXY="http://$ip:$port" no_proxy="localhost,127.0.0.1,$ip,::1" NO_PROXY="localhost,127.0.0.1,$ip,::1"; echo "🔗 代理已启用: $ip:$port"; }; proxy_on
  tags: [proxy, network]

- name: proxy off
  cmd: |
    proxy_off(){ unset http_proxy https_proxy all_proxy HTTP_PROXY HTTPS_PROXY ALL_PROXY no_proxy NO_PROXY; echo "🔌 代理已关闭"; }; proxy_off
  tags: [proxy, network]
