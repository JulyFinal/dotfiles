search_mode = "daemon-fuzzy"
store_failed = true
secrets_filter = true

[daemon]
enabled = true
autostart = true

[sync]
records = true

[dotfiles]
enabled = true

# Keep Atuin AI opt-in. If it is enabled later, start with history search only;
# file mutation, command execution, and captured terminal output remain blocked.
[ai]
enabled = false
yolo = false

[ai.capabilities]
enable_history_search = true
enable_history_output = false
enable_file_tools = false
enable_command_execution = false

[ai.opening]
send_cwd = false
send_last_command = false
