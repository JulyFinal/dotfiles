[terminal]
vt = 1

[default_session]
command = "/usr/bin/tuigreet --cmd niri-session --remember --remember-user-session --asterisks --asterisks-char '*' --time --time-format '%Y-%m-%d  %H:%M' --width 80 --window-padding 1 --container-padding 1 --prompt-padding 1 --theme 'border=darkgray;text=white;time=darkgray;container=black;title=white;greet=white;prompt=white;input=lightblue;action=darkgray;button=lightblue'"
user = "greeter"
